# Correction TP chapitre 4 — le filtre avec le tag http_error.
# (Extrait du pipeline : seule la partie filter change ; input et output sont
#  identiques au template ../ansible-extraits/roles/logstash/templates/pipeline.conf.j2.)

filter {
  # grok : découpe la ligne nginx en champs (clientip, verb, response, bytes…).
  if [message] =~ /HTTP\/\d/ {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
      tag_on_failure => ["_nginxparsefailure"]
    }
  } else {
    mutate {
      add_tag => ["non_nginx"]
    }
  }

  # NOUVEAU : après le grok, response existe. Si c'est une erreur HTTP (>= 400),
  # on colle le tag http_error. Le `and [response]` protège les lignes non-nginx
  # (où response n'existe pas). Logstash convertit le texte "404" en entier pour
  # la comparaison.
  if [response] and [response] >= 400 {
    mutate {
      add_tag => ["http_error"]
    }
  }
}
